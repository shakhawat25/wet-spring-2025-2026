<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Discount Calculator Page</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page">
    <section class="card">
      <h1>Discount Calculator</h1>
      <p class="subtitle">Enter the original price and discount percentage to see the final price instantly.</p>

      <div class="price-box">
        <span class="label">Fixed Tax Rate</span>
        <span class="value"><span id="tax-rate">5</span>%</span>
      </div>

      <div class="form-group">
        <label for="original-price">Original Price</label>
        <input
          type="number"
          id="original-price"
          name="original-price"
          min="0"
          step="0.01"
          value="0"
          placeholder="Enter original price"
        />
        <small id="price-error" class="error-message" aria-live="polite"></small>
      </div>

      <div class="form-group">
        <label for="discount-percent">Discount Percentage</label>
        <input
          type="number"
          id="discount-percent"
          name="discount-percent"
          min="0"
          max="100"
          step="0.01"
          value="0"
          placeholder="Enter discount percentage"
        />
        <small id="discount-error" class="error-message" aria-live="polite"></small>
      </div>

      <div class="form-group">
        <label for="final-price">Final Price</label>
        <input type="text" id="final-price" name="final-price" value="৳0.00" readonly />
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
