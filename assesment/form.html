<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donation Form</title>

    <link rel="stylesheet" type="text/css" href="form.css">

</head>

<body>

    <header>

        <h1>Donor Information</h1>

    </header>


    <main>

        <form method="post">




            <table border="0" cellpadding="6">

                <tr>
                    <td><label for="firstName">First Name <b><span>*</span></b></label></td>
                    <td><input type="text" id="firstName" name="firstName" required></td>
                </tr>

                <tr>
                    <td><label for="lastName">Last Name <b><span>*</span></b></label></td>
                    <td><input type="text" id="lastName" name="lastName" required></td>
                </tr>

                <tr>
                    <td><label for="company">Company</label></td>
                    <td><input type="text" id="company" name="company"></td>
                </tr>

                <tr>
                    <td><label for="address1">Address 1 <b><span>*</span></b></label></td>
                    <td><input type="text" id="address1" name="address1" required></td>
                </tr>

                <tr>
                    <td><label for="address2">Address 2</label></td>
                    <td><input type="text" id="address2" name="address2"></td>
                </tr>

                <tr>
                    <td><label for="city">City <b><span>*</span></b></label></td>
                    <td><input type="text" id="city" name="city" required></td>
                </tr>

                <tr>
                    <td><label for="state">State <b><span>*</span></b></label></td>
                    <td>
                        <select id="state" name="state" required>
                            <option value="">Select a State</option>
                            <option>Dhaka</option>
                            <option>Chattogram</option>
                            <option>Rajshahi</option>
                            <option>Khulna</option>
                            <option>Sylhet</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td><label for="zip">Zip Code <b><span>*</span></b></label></td>
                    <td><input type="text" id="zip" name="zip" required></td>
                </tr>

                <tr>
                    <td><label for="country">Country <span>*</span></label></td>
                    <td>
                        <select id="country" name="country" required>
                            <option value="">Select a Country</option>
                            <option>Bangladesh</option>
                            <option>India</option>
                            <option>USA</option>
                            <option>UK</option>
                        </select>
                    </td>
                </tr>

                <tr>
                    <td><label for="phone">Phone</label></td>
                    <td><input type="tel" id="phone" name="phone"></td>
                </tr>

                <tr>
                    <td><label for="fax">Fax</label></td>
                    <td><input type="text" id="fax" name="fax"></td>
                </tr>

                <tr>
                    <td><label for="email">Email <span>*</span></label></td>
                    <td><input type="email" id="email" name="email" required></td>
                </tr>

            </table>




            <p>
                <b>Donation Amount <span>*</span></b>
                <br>
            </p>


            <label>
                <input type="radio" name="amount" value="none" required>
                None
            </label>

            <label>
                <input type="radio" name="amount" value="50">
                $50
            </label>

            <label>
                <input type="radio" name="amount" value="75">
                $75
            </label>

            <label>
                <input type="radio" name="amount" value="100">
                $100
            </label>

            <label>
                <input type="radio" name="amount" value="250">
                $250
            </label>

            <label>
                <input type="radio" name="amount" value="other">
                Other
            </label>

            <br><br>

            <label for="otherAmount"><b>Other Amount $</b></label>
            <input type="number" id="otherAmount" name="otherAmount" min="1" placeholder="Enter amount">

            <br><br>

            <label>
                <input type="checkbox" id="recurring" name="recurring" value="yes">
                <b>I am interested in giving on a regular basis.
            </label></b>

            <br><br>

            <label for="monthlyCard"><b>Monthly Credit Card $</b></label>
            <input type="number" id="monthlyCard" name="monthlyCard" min="1" placeholder="Amount">

            <label for="months"><b>For</b></label>
            <input type="number" id="months" name="months" min="1" placeholder="Months">

            <br><br>

            <input type="submit" value="Submit">
            <input type="reset" value="Reset">


        </form>

    </main>

</body>

</html>
